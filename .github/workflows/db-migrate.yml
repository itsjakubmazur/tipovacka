name: DB migrate

# Applies supabase/migrations/ to the live database whenever main gets a
# new migration - no more copy-pasting SQL into the dashboard.
#
# Needs two repo secrets (Settings -> Secrets -> Actions):
#   SUPABASE_ACCESS_TOKEN - personal access token from
#     https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD  - the database password
#     (dashboard -> Project Settings -> Database)
# and one repo variable (Settings -> Variables -> Actions):
#   SUPABASE_PROJECT_ID   - the project ref, i.e. the <ref> part of
#     https://<ref>.supabase.co
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      # One-time bootstrap: this workflow never ran successfully before
      # (SUPABASE_PROJECT_ID was unset), so every migration up to
      # 20260716000000 was actually applied by hand via the SQL editor
      # instead - the CLI's own history table has no record of them.
      # Tell it they're already applied (no SQL re-run) so `db push`
      # below only ever picks up migrations added after this point.
      # Safe to delete this step once it's run successfully once.
      - name: Repair migration history (one-time bootstrap)
        run: |
          supabase migration repair --status applied \
            20260618000000 20260618010000 20260618020000 20260618030000 20260618040000 \
            20260619000000 20260619010000 20260619020000 20260620000000 20260621000000 \
            20260622000000 20260623000000 20260624000000 20260625000000 20260626000000 \
            20260627000000 20260628000000 20260629000000 20260630000000 20260701000000 \
            20260702000000 20260703000000 20260704000000 20260705000000 20260706000000 \
            20260706010000 20260707000000 20260708000000 20260709000000 20260710000000 \
            20260711000000 20260712000000 20260713000000 20260714000000 20260715000000 \
            20260716000000
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Push migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
