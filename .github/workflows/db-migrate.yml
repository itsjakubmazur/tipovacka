name: DB migrate

# Applies supabase/migrations/ to the live database whenever main gets a
# new migration - no more copy-pasting SQL into the dashboard.
#
# Needs two repo secrets (Settings -> Secrets -> Actions):
#   SUPABASE_ACCESS_TOKEN - personal access token from
#     https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD  - the database password
#     (dashboard -> Project Settings -> Database)
# and one repo variable (Settings -> Variables -> Actions):
#   SUPABASE_PROJECT_ID   - the project ref, i.e. the <ref> part of
#     https://<ref>.supabase.co
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      - name: Push migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
