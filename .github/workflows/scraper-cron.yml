name: Scraper cron

on:
  schedule:
    # Every 15 minutes: imports a new event's card once its 5-minute
    # grace period passes, rechecks unlocked cards for short-notice
    # changes every ~3h, sends "locks in an hour" reminders, and tries
    # to pull results for events that have started. One scheduled job
    # instead of several, since GitHub Actions bills a 1-minute minimum
    # per run no matter how short the script actually takes.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  cron:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Run cron
        working-directory: scraper
        run: python cron.py
