name: Scraper cron

on:
  # No native `schedule:` trigger - GitHub doesn't guarantee its cadence
  # (in practice it drifted by hours on this repo, badly delaying
  # time-sensitive pushes like lock reminders/results notifications).
  # Triggered instead by an external scheduler (cron-job.org) calling
  # the workflow_dispatch REST endpoint every few minutes with a PAT -
  # see README.md for setup. Does, in one run: imports a new event's
  # card once its 5-minute grace period passes, rechecks unlocked cards
  # for short-notice changes every ~3h, sends "locks in an hour"
  # reminders and "gala starts" pushes, and tries to pull results for
  # events that have started.
  workflow_dispatch: {}

jobs:
  cron:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Run cron
        working-directory: scraper
        run: python cron.py
