name: Sherdog scraper

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Co importovat"
        required: true
        type: choice
        options:
          - card
          - results
          - fightmatrix
          - backfill_photos
          - debug_oktagon
      event_id:
        description: "UUID galavečera (events.id v Supabase, není potřeba pro backfill_photos/debug_oktagon)"
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Import card (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'card'
        working-directory: scraper
        run: python import_card.py --event-id "${{ inputs.event_id }}"

      - name: Import results (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'results'
        working-directory: scraper
        run: python import_results.py --event-id "${{ inputs.event_id }}"

      - name: Import Fight Matrix rank/score (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'fightmatrix'
        working-directory: scraper
        run: python import_fightmatrix.py --event-id "${{ inputs.event_id }}"

      - name: Backfill bigger fighter photos (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'backfill_photos'
        working-directory: scraper
        run: python backfill_photo_urls.py

      - name: Debug oktagonmma.com fantasy page (temporary)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'debug_oktagon'
        working-directory: scraper
        run: python _debug_oktagon.py
