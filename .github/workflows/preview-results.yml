name: Preview result notifications (dry run)

on:
  workflow_dispatch:
    inputs:
      number:
        description: "Číslo OKTAGONu, který se má zkusit naformátovat (např. 89)"
        required: true
        type: string

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      # Not actually used by preview_results.py - only present because
      # import_results.py (imported for its formatting helper) imports
      # push.py, which reads these at module import time.
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Preview results
        working-directory: scraper
        run: python preview_results.py --number "${{ inputs.number }}"
